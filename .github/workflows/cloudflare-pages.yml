name: Deploy to Cloudflare Pages

# Builds the Vite app and publishes dist/ to the "scopedrop" Cloudflare Pages
# project (https://scopedrop.pages.dev) via Direct Upload. Additive to Netlify —
# nothing here touches DNS or the existing Netlify site.
#
# Requires two GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_KEY     - Cloudflare API token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare account ID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # First run bootstraps the Pages project; later runs no-op (already exists).
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create scopedrop --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=scopedrop --branch=main
