name: Deploy to Cloudflare Pages

# Builds the Vite app and publishes dist/ to the "scopedrop" Cloudflare Pages
# project via Direct Upload. Additive to Netlify — no DNS touched.
#
# push to main            -> production deploy (https://scopedrop.pages.dev)
# pull_request into main  -> preview deploy on a per-branch *.pages.dev URL
#
# Build-time VITE_* config comes from the committed .env at the repo root, so no
# VITE_* secrets are needed here. Required GitHub repo secrets:
#   CLOUDFLARE_API_KEY     - Cloudflare API token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare account ID

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # First run bootstraps the Pages project; later runs no-op (already exists).
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create scopedrop --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=scopedrop --branch=${{ github.head_ref || github.ref_name }}
